heading:
  type: text
  comment: Main heading text for the hero.
subtext:
  type: markdown
  comment: Supporting subtext displayed beneath the heading.
  options:
    blockquote: false
    bold: true
    format:
    italic: true
    link: true
    strike: false
    subscript: true
    superscript: true
    underline: false
    bulletedlist: false
    numberedlist: false
variation:
  type: select
  comment: Choose between two different layouts for the search hero - full-width or left-right.
  options:
    values:
      - id: full-width
        name: Full width
      - id: left-right
        name: Left-right split
colorScheme:
  type: select
  comment: Color scheme theme for the hero.
  options:
    values:
      - id: inherit
        name: Inherit
      - id: light
        name: Light
      - id: dark
        name: Dark
backgroundColor:
  type: select
  comment: Background color for the hero.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
      - id: brand-linear-gradient-strong
        name: Brand Linear Gradient Strong
