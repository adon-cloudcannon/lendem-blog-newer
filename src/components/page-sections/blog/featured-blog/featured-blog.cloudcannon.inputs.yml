id:
  type: text
  comment: Unique identifier for the section which can be used as an anchor link.
heading:
  type: html
  comment: Main heading text for the section.
subtext:
  type: markdown
  comment: Optional subtext displayed beneath the heading.
  options:
    bold: true
    italic: true
    link: true
    underline: true
colorScheme:
  type: select
  comment: Color scheme theme for the hero.
  options:
    values:
      - id: inherit
        name: Inherit
      - id: light
        name: Light
      - id: dark
        name: Dark
backgroundColor:
  type: select
  comment: Background color for the section.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
      - id: muted
        name: Muted
      - id: brand-linear-gradient-muted
        name: Brand Linear Gradient Muted
      - id: brand-linear-gradient-strong
        name: Brand Linear Gradient Strong
featuredArticles:
  type: multiselect
  comment: The first article in this list will occupy the large featured article space; the others will appear in the side list. It is recommended to have 6 articles here.
  options:
    allow_empty: true
    max_items: 6
    max_items_message: Cannot be more than 6
    values: collections.blog
    value_key: {url|slugify}
    preview:
      text:
        - key: title