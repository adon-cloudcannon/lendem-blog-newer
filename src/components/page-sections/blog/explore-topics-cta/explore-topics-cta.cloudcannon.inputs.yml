id:
  type: text
  comment: Unique identifier for the section which can be used as an anchor link.
colorScheme:
  type: select
  comment: Color scheme theme for the hero.
  options:
    values:
      - id: inherit
        name: Inherit
      - id: light
        name: Light
      - id: dark
        name: Dark
backgroundColor:
  type: select
  comment: Background color for the section.
  options:
    values:
      - id: none
        name: None
      - id: base
        name: Base
      - id: surface
        name: Surface
      - id: accent
        name: Accent
      - id: highlight
        name: Highlight
      - id: muted
        name: Muted
      - id: brand-linear-gradient-muted
        name: Brand Linear Gradient Muted
      - id: brand-linear-gradient-strong
        name: Brand Linear Gradient Strong